name: Build macOS DMG Release

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: macos-release-main
  cancel-in-progress: true

jobs:
  build-and-release:
    runs-on: macos-latest
    env:
      AMPLITUDE_API_KEY: ${{ secrets.AMPLITUDE_API_KEY }}
      APPLE_SIGNING_CERT_BASE64: ${{ secrets.APPLE_SIGNING_CERT_BASE64 }}
      APPLE_SIGNING_CERT_PASSWORD: ${{ secrets.APPLE_SIGNING_CERT_PASSWORD }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
      APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
      APPLE_NOTARY_API_KEY_BASE64: ${{ secrets.APPLE_NOTARY_API_KEY_BASE64 }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          raw_version="$(awk '/^version:/ { print $2; exit }' pubspec.yaml)"
          version_name="${raw_version%%+*}"
          build_number="${GITHUB_RUN_NUMBER}"
          short_sha="${GITHUB_SHA::7}"
          app_name="d1v.app"
          dmg_name="d1v-macos-${version_name}+${build_number}-${short_sha}.dmg"
          release_tag="macos-main-v${version_name}-build.${build_number}"
          release_name="macOS DMG ${version_name} (build ${build_number})"

          {
            echo "raw_version=${raw_version}"
            echo "version_name=${version_name}"
            echo "build_number=${build_number}"
            echo "short_sha=${short_sha}"
            echo "app_name=${app_name}"
            echo "dmg_name=${dmg_name}"
            echo "release_tag=${release_tag}"
            echo "release_name=${release_name}"
          } >> "${GITHUB_OUTPUT}"

      - name: Install dependencies
        run: flutter pub get

      - name: Validate signing and notarization secrets
        shell: bash
        run: |
          required_vars=(
            APPLE_SIGNING_CERT_BASE64
            APPLE_SIGNING_CERT_PASSWORD
            APPLE_SIGNING_IDENTITY
            APPLE_TEAM_ID
            APPLE_NOTARY_KEY_ID
            APPLE_NOTARY_ISSUER_ID
            APPLE_NOTARY_API_KEY_BASE64
          )

          for var_name in "${required_vars[@]}"; do
            if [ -z "${!var_name}" ]; then
              echo "Missing required secret: ${var_name}" >&2
              exit 1
            fi
          done

      - name: Import Developer ID certificate
        shell: bash
        run: |
          KEYCHAIN_PASSWORD="$(openssl rand -hex 16)"
          CERT_PATH="${RUNNER_TEMP}/developer-id.p12"
          KEYCHAIN_PATH="${RUNNER_TEMP}/build.keychain-db"

          echo "${APPLE_SIGNING_CERT_BASE64}" | base64 --decode > "${CERT_PATH}"

          security create-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security set-keychain-settings -lut 21600 "${KEYCHAIN_PATH}"
          security unlock-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security import "${CERT_PATH}" \
            -k "${KEYCHAIN_PATH}" \
            -P "${APPLE_SIGNING_CERT_PASSWORD}" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s \
            -k "${KEYCHAIN_PASSWORD}" \
            "${KEYCHAIN_PATH}"
          security list-keychains -d user -s "${KEYCHAIN_PATH}" login.keychain-db
          security default-keychain -d user -s "${KEYCHAIN_PATH}"

          resolved_identity="$(
            security find-identity -v -p codesigning "${KEYCHAIN_PATH}" \
              | sed -n 's/.*"\(Developer ID Application:.*\)"/\1/p' \
              | head -n 1
          )"

          if [ -z "${resolved_identity}" ]; then
            echo "No Developer ID Application identity was found in the imported certificate." >&2
            security find-identity -v -p codesigning "${KEYCHAIN_PATH}" >&2 || true
            exit 1
          fi

          {
            echo "MACOS_KEYCHAIN_PASSWORD=${KEYCHAIN_PASSWORD}"
            echo "MACOS_KEYCHAIN_PATH=${KEYCHAIN_PATH}"
            echo "MACOS_SIGNING_IDENTITY=${resolved_identity}"
          } >> "${GITHUB_ENV}"

          echo "Resolved Developer ID identity: ${resolved_identity}"

      - name: Prepare App Store Connect API key
        shell: bash
        run: |
          API_KEY_PATH="${RUNNER_TEMP}/AuthKey_${APPLE_NOTARY_KEY_ID}.p8"
          echo "${APPLE_NOTARY_API_KEY_BASE64}" | base64 --decode > "${API_KEY_PATH}"
          chmod 600 "${API_KEY_PATH}"
          echo "APPLE_NOTARY_API_KEY_PATH=${API_KEY_PATH}" >> "${GITHUB_ENV}"

      - name: Build macOS app
        shell: bash
        run: >
          flutter build macos --release
          --build-name="${{ steps.meta.outputs.version_name }}"
          --build-number="${{ steps.meta.outputs.build_number }}"
          --dart-define=AMPLITUDE_API_KEY="${AMPLITUDE_API_KEY}"

      - name: Codesign app bundle
        shell: bash
        run: |
          app_path="build/macos/Build/Products/Release/${{ steps.meta.outputs.app_name }}"
          entitlements_path="macos/Runner/Release.entitlements"

          if [ ! -d "${app_path}" ]; then
            echo "Expected app bundle not found at ${app_path}" >&2
            exit 1
          fi

          xattr -cr "${app_path}"

          codesign --force --deep --options runtime --timestamp \
            --entitlements "${entitlements_path}" \
            --sign "${MACOS_SIGNING_IDENTITY}" \
            "${app_path}"

          codesign --verify --deep --strict --verbose=2 "${app_path}"
          codesign --display --verbose=4 "${app_path}" 2>&1 | sed -n '/Authority=/p;/TeamIdentifier=/p;/Timestamp=/p'

      - name: Package DMG
        shell: bash
        run: |
          app_path="build/macos/Build/Products/Release/${{ steps.meta.outputs.app_name }}"
          if [ ! -d "${app_path}" ]; then
            echo "Expected app bundle not found at ${app_path}" >&2
            exit 1
          fi

          rm -rf build/macos/dmg
          mkdir -p build/macos/dmg
          cp -R "${app_path}" build/macos/dmg/
          ln -s /Applications build/macos/dmg/Applications

          hdiutil create \
            -volname "d1v" \
            -srcfolder build/macos/dmg \
            -ov \
            -format UDZO \
            "build/macos/${{ steps.meta.outputs.dmg_name }}"

      - name: Codesign DMG
        shell: bash
        run: |
          dmg_path="build/macos/${{ steps.meta.outputs.dmg_name }}"
          codesign --force --timestamp --sign "${MACOS_SIGNING_IDENTITY}" "${dmg_path}"
          codesign --verify --verbose=2 "${dmg_path}"

      - name: Notarize DMG
        id: notarize
        shell: bash
        run: |
          dmg_path="build/macos/${{ steps.meta.outputs.dmg_name }}"
          diagnostics_dir="build/macos/notary"
          submit_json="${diagnostics_dir}/submit-response.json"
          log_json="${diagnostics_dir}/notary-log.json"

          mkdir -p "${diagnostics_dir}"

          xcrun notarytool submit "${dmg_path}" \
            --key "${APPLE_NOTARY_API_KEY_PATH}" \
            --key-id "${APPLE_NOTARY_KEY_ID}" \
            --issuer "${APPLE_NOTARY_ISSUER_ID}" \
            --team-id "${APPLE_TEAM_ID}" \
            --wait \
            --output-format json | tee "${submit_json}"

          submission_id="$(python3 -c 'import json, sys; print(json.load(open(sys.argv[1], encoding="utf-8")).get("id", ""))' "${submit_json}")"

          status="$(python3 -c 'import json, sys; print(json.load(open(sys.argv[1], encoding="utf-8")).get("status", ""))' "${submit_json}")"

          echo "submission_id=${submission_id}" >> "${GITHUB_OUTPUT}"
          echo "status=${status}" >> "${GITHUB_OUTPUT}"

          xcrun notarytool log "${submission_id}" \
            --key "${APPLE_NOTARY_API_KEY_PATH}" \
            --key-id "${APPLE_NOTARY_KEY_ID}" \
            --issuer "${APPLE_NOTARY_ISSUER_ID}" \
            --team-id "${APPLE_TEAM_ID}" \
            --output-format json > "${log_json}" || true

          echo "Notary submission id: ${submission_id}"
          echo "Notary status: ${status}"
          if [ -f "${log_json}" ]; then
            echo "Notary log:"
            cat "${log_json}"
          fi

          if [ "${status}" != "Accepted" ]; then
            echo "Notarization did not reach Accepted status." >&2
            exit 1
          fi

      - name: Staple DMG
        shell: bash
        run: |
          dmg_path="build/macos/${{ steps.meta.outputs.dmg_name }}"
          diagnostics_dir="build/macos/notary"
          attempts_dir="${diagnostics_dir}/stapler-attempts"
          history_tsv="${diagnostics_dir}/stapler-history.tsv"

          mkdir -p "${attempts_dir}"
          printf "attempt\tutc_started_at\texit_code\trecord_not_found\n" > "${history_tsv}"

          for attempt in $(seq 1 40); do
            started_at="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
            attempt_log="${attempts_dir}/attempt-$(printf "%02d" "${attempt}").log"

            set +e
            xcrun stapler staple "${dmg_path}" > "${attempt_log}" 2>&1
            exit_code=$?
            set -e

            if rg -q 'Record not found' "${attempt_log}"; then
              record_not_found=true
            else
              record_not_found=false
            fi

            printf "%s\t%s\t%s\t%s\n" \
              "${attempt}" \
              "${started_at}" \
              "${exit_code}" \
              "${record_not_found}" >> "${history_tsv}"

            cat "${attempt_log}"

            if [ "${exit_code}" -eq 0 ]; then
              exit 0
            fi

            if [ "${record_not_found}" != "true" ]; then
              echo "Stapling failed for a reason other than CloudKit propagation." >&2
              exit "${exit_code}"
            fi

            if [ "${attempt}" -eq 40 ]; then
              echo "Stapling DMG failed after ${attempt} attempts." >&2
              exit 1
            fi

            echo "Stapling DMG not ready yet. Retrying in 30 seconds..."
            sleep 30
          done

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.dmg_name }}
          path: build/macos/${{ steps.meta.outputs.dmg_name }}

      - name: Upload notarization diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: notarization-diagnostics-${{ steps.meta.outputs.short_sha }}
          path: build/macos/notary

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.release_tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.meta.outputs.release_name }}
          prerelease: true
          fail_on_unmatched_files: true
          body: |
            Direct macOS desktop release built from `main`.

            ## Release snapshot
            - Version: `${{ steps.meta.outputs.version_name }}`
            - Build: `${{ steps.meta.outputs.build_number }}`
            - Commit: `${{ github.sha }}`
            - DMG: `${{ steps.meta.outputs.dmg_name }}`

            ## Install
            1. Download the DMG asset from this release.
            2. Open the DMG and drag `d1v.app` into `/Applications`.
            3. Launch the app from Applications and verify the latest desktop flow.

            ## Notes
            - This release is generated automatically by GitHub Actions.
            - The `.app` bundle is signed before packaging.
            - The outer `.dmg` container is signed, notarized, and stapled for standard Gatekeeper-friendly distribution.
          files: build/macos/${{ steps.meta.outputs.dmg_name }}

      - name: Cleanup temporary keychain
        if: always()
        shell: bash
        run: |
          if [ -n "${MACOS_KEYCHAIN_PATH:-}" ]; then
            security delete-keychain "${MACOS_KEYCHAIN_PATH}" || true
          fi
